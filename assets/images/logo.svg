<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="100%" style="stop-color:#8338ec"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- GinanRM Logo -->
  <g transform="translate(5, 5)">
    <!-- Body -->
    <rect x="8" y="25" width="34" height="25" rx="4" fill="#6b7280"/>
    <!-- Screen Head -->
    <rect x="5" y="2" width="40" height="30" rx="4" fill="#374151"/>
    <rect x="8" y="5" width="34" height="24" rx="2" fill="#7dd3fc"/>
    <!-- Beret -->
    <ellipse cx="25" cy="5" rx="18" ry="6" fill="#22c55e"/>
    <circle cx="25" cy="2" r="3" fill="#22c55e"/>
    <!-- Face -->
    <circle cx="18" cy="15" r="3" fill="#1f2937"/>
    <circle cx="32" cy="15" r="3" fill="#1f2937"/>
    <path d="M20 22 Q25 26 30 22" stroke="#1f2937" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Text -->
  <g filter="url(#glow)">
    <text x="58" y="38" font-family="'Orbitron', sans-serif" font-size="16" font-weight="700" fill="url(#neonGlow)">
      GinanRM
    </text>
  </g>
</svg>

